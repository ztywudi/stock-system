<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存管理系统</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

  <!-- ===== 侧边栏 ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">📦</span>
      <span>库存管理系统</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="dashboard">
        <span class="icon">📊</span><span>工作台</span>
      </div>
      <div class="nav-item" data-page="items">
        <span class="icon">📋</span><span>物品管理</span>
      </div>
      <div class="nav-item" data-page="categories">
        <span class="icon">🏷️</span><span>分类管理</span>
      </div>
      <div class="nav-item" data-page="in">
        <span class="icon">📥</span><span>入库管理</span>
      </div>
      <div class="nav-item" data-page="out">
        <span class="icon">📤</span><span>出库管理</span>
      </div>
      <div class="nav-item" data-page="transactions">
        <span class="icon">📜</span><span>出入库记录</span>
      </div>
      <div class="nav-item" data-page="check">
        <span class="icon">🔍</span><span>库存盘点</span>
      </div>
      <div class="nav-item" data-page="stats">
        <span class="icon">📈</span><span>统计报表</span>
      </div>
      <div class="nav-item" data-page="tools">
        <span class="icon">🛠️</span><span>导入/导出/备份</span>
      </div>
      <div class="nav-item" data-page="settings">
        <span class="icon">⚙️</span><span>系统设置</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      服务器模式 &nbsp;|&nbsp; 数据存储于本地
    </div>
  </aside>

  <!-- ===== 主内容区 ===== -->
  <main class="main" id="app">
    <!-- 由 JS 动态渲染 -->
  </main>

</div>

<!-- ===== 模态框容器 ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <!-- 由 JS 动态填充 -->
  </div>
</div>

<!-- ===== Toast 容器 ===== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===== JS ===== -->
<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
